name: device_sentinel_windows
description: >-
  Windows implementation of the device_sentinel plugin for detecting hardware
  button presses using low-level keyboard hooks and WM_POWERBROADCAST.
version: 1.1.0
homepage: https://github.com/Crdzbird/device_sentinel
repository: https://github.com/Crdzbird/device_sentinel
issue_tracker: https://github.com/Crdzbird/device_sentinel/issues
topics:
  - hardware-buttons
  - device-security
  - flutter-plugin

environment:
  sdk: ^3.0.0
  flutter: '>=3.10.0'

flutter:
  plugin:
    implements: device_sentinel
    platforms:
      windows:
        pluginClass: DeviceSentinelWindows
        dartPluginClass: DeviceSentinelWindows

dependencies:
  device_sentinel_platform_interface: ^1.0.0
  flutter:
    sdk: flutter

dev_dependencies:
  flutter_test:
    sdk: flutter
  very_good_analysis: ^10.2.0
