name: device_sentinel_linux
description: >-
  Linux stub implementation of the device_sentinel plugin. Physical button
  detection is not supported on Linux.
version: 1.0.0
repository: https://github.com/Crdzbird/device_sentinel

environment:
  sdk: ^3.0.0
  flutter: '>=3.10.0'

flutter:
  plugin:
    implements: device_sentinel
    platforms:
      linux:
        pluginClass: DeviceSentinelPlugin
        dartPluginClass: DeviceSentinelLinux

dependencies:
  flutter:
    sdk: flutter
  device_sentinel_platform_interface: ^1.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  very_good_analysis: ^10.2.0
