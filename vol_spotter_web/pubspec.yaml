name: vol_spotter_web
description: Web implementation of the vol_spotter plugin
version: 0.1.0+1
publish_to: none

environment:
  sdk: ^3.11.0

flutter:
  plugin:
    implements: vol_spotter
    platforms:
      web:
        pluginClass: VolSpotterWeb
        fileName: vol_spotter_web.dart

dependencies:
  flutter:
    sdk: flutter
  flutter_web_plugins:
    sdk: flutter
  vol_spotter_platform_interface:
    path: ../vol_spotter_platform_interface

dev_dependencies:
  flutter_test:
    sdk: flutter
  very_good_analysis: ^10.2.0
