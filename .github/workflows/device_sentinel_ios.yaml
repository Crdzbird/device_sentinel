name: device_sentinel_ios

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

on:
  pull_request:
    paths:
      - ".github/workflows/device_sentinel_ios.yaml"
      - "device_sentinel_ios/**"
  push:
    branches:
      - main
    paths:
      - ".github/workflows/device_sentinel_ios.yaml"
      - "device_sentinel_ios/**"

jobs:
  build:
    uses: VeryGoodOpenSource/very_good_workflows/.github/workflows/flutter_package.yml@v1
    with:
      flutter_version: 3.41.1
      working_directory: device_sentinel_ios

