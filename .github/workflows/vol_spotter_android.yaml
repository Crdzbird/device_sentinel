name: vol_spotter_android

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

on:
  pull_request:
    paths:
      - ".github/workflows/vol_spotter_android.yaml"
      - "vol_spotter_android/**"
  push:
    branches:
      - main
    paths:
      - ".github/workflows/vol_spotter_android.yaml"
      - "vol_spotter_android/**"

jobs:
  build:
    uses: VeryGoodOpenSource/very_good_workflows/.github/workflows/flutter_package.yml@v1
    with:
      flutter_version: 3.41.1
      working_directory: vol_spotter_android

