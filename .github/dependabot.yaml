version: 2
enable-beta-ecosystems: true
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "daily"
  - package-ecosystem: "pub"
    directory: "/vol_spotter"
    schedule:
      interval: "daily"
  - package-ecosystem: "pub"
    directory: "/vol_spotter/example"
    schedule:
      interval: "daily"
  - package-ecosystem: "pub"
    directory: "/vol_spotter_platform_interface"
    schedule:
      interval: "daily"
  - package-ecosystem: "pub"
    directory: "/vol_spotter_android"
    schedule:
      interval: "daily"
  - package-ecosystem: "pub"
    directory: "/vol_spotter_ios"
    schedule:
      interval: "daily"
  - package-ecosystem: "pub"
    directory: "/vol_spotter_linux"
    schedule:
      interval: "daily"
  - package-ecosystem: "pub"
    directory: "/vol_spotter_macos"
    schedule:
      interval: "daily"
  - package-ecosystem: "pub"
    directory: "/vol_spotter_web"
    schedule:
      interval: "daily"
  - package-ecosystem: "pub"
    directory: "/vol_spotter_windows"
    schedule:
      interval: "daily"