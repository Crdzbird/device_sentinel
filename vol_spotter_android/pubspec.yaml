name: vol_spotter_android
description: Android implementation of the vol_spotter plugin
version: 0.1.0+1
publish_to: none

environment:
  sdk: ^3.11.0

flutter:
  plugin:
    implements: vol_spotter
    platforms:
      android:
        package: com.example.verygoodcore
        pluginClass: VolSpotterPlugin
        dartPluginClass: VolSpotterAndroid

dependencies:
  flutter:
    sdk: flutter
  vol_spotter_platform_interface:
    path: ../vol_spotter_platform_interface

dev_dependencies:
  flutter_test:
    sdk: flutter
  plugin_platform_interface: ^2.1.8
  very_good_analysis: ^10.2.0
