name: device_sentinel_android
description: >-
  Android implementation of the device_sentinel plugin for detecting physical
  button presses (volume, power) using Window.Callback and BroadcastReceiver.
version: 1.0.0
repository: https://github.com/Crdzbird/device_sentinel

environment:
  sdk: ^3.0.0
  flutter: '>=3.10.0'

flutter:
  plugin:
    implements: device_sentinel
    platforms:
      android:
        package: com.example.verygoodcore
        pluginClass: DeviceSentinelPlugin
        dartPluginClass: DeviceSentinelAndroid

dependencies:
  flutter:
    sdk: flutter
  device_sentinel_platform_interface: ^1.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  plugin_platform_interface: ^2.1.8
  very_good_analysis: ^10.2.0
