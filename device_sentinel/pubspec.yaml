name: device_sentinel
description: >-
  A Flutter plugin for detecting hardware button presses and device security
  events with configurable per-button interception on Android, iOS, macOS, and
  Windows.
version: 1.1.0
homepage: https://github.com/Crdzbird/device_sentinel
repository: https://github.com/Crdzbird/device_sentinel
issue_tracker: https://github.com/Crdzbird/device_sentinel/issues
topics:
  - hardware-buttons
  - device-security
  - flutter-plugin

environment:
  sdk: ^3.0.0
  flutter: '>=3.10.0'

flutter:
  plugin:
    platforms:
      android:
        default_package: device_sentinel_android
      ios:
        default_package: device_sentinel_ios
      linux:
        default_package: device_sentinel_linux
      macos:
        default_package: device_sentinel_macos
      web:
        default_package: device_sentinel_web
      windows:
        default_package: device_sentinel_windows

dependencies:
  device_sentinel_android: ^1.0.0
  device_sentinel_ios: ^1.0.0
  device_sentinel_linux: ^1.0.0
  device_sentinel_macos: ^1.0.0
  device_sentinel_platform_interface: ^1.0.0
  device_sentinel_web: ^1.0.0
  device_sentinel_windows: ^1.0.0
  flutter:
    sdk: flutter

dev_dependencies:
  flutter_test:
    sdk: flutter
  mocktail: ^1.0.4
  plugin_platform_interface: ^2.1.8
  very_good_analysis: ^10.2.0
